{{ define "main" }}
<main class="container">
  <div class="page-header">
    <h1>{{ .Title }}</h1>
    <p>{{ .Params.description }}</p>
  </div>

  <div class="contact-form" style="margin-bottom: 6rem;">
    <form action="{{ site.Params.contact_form_action }}" method="POST">
      <div class="form-group">
        <label for="name">Your Name</label>
        <input type="text" id="name" name="name" class="form-control" placeholder="e.g. John Doe" required>
      </div>
      <div class="form-group">
        <label for="email">Email Address</label>
        <input type="email" id="email" name="email" class="form-control" placeholder="john@example.com" required>
      </div>
      <div class="form-group">
        <label for="message">How can we help you automate?</label>
        <textarea id="message" name="message" class="form-control" placeholder="Describe your workflow bottleneck..." required></textarea>
      </div>
      <button type="submit" class="btn-primary" style="width: 100%; justify-content: center; margin-top: 1rem;">
        Send Message
      </button>
    </form>
    
    <div style="text-align: center; margin-top: 2rem; color: var(--c-text-muted); font-size: 0.9rem;">
      Or email us directly at <a href="mailto:{{ site.Params.email }}">{{ site.Params.email }}</a>
    </div>
  </div>
</main>
{{ end }}
