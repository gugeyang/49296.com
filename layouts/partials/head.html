<head>
  <meta charset="utf-8">
  <title>{{ .Title | default site.Title }}</title>
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
  <meta name="description" content="{{ .Params.description | default site.Params.description }}">
  <meta name="author" content="{{ .Params.author | default site.Params.author }}">
  
  <!-- Google Analytics (GA4) -->
  {{ if site.Params.google_analytics_id }}
  <script async src="https://www.googletagmanager.com/gtag/js?id={{ site.Params.google_analytics_id }}"></script>
  <script>
    window.dataLayer = window.dataLayer || [];
    function gtag(){dataLayer.push(arguments);}
    gtag('js', new Date());
    gtag('config', '{{ site.Params.google_analytics_id }}');
  </script>
  {{ end }}

  <!-- Google AdSense Verification (填入你的 AdSense publisher ID 后取消注释) -->
  <!-- <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-XXXXXXXXXXXXXXXX" crossorigin="anonymous"></script> -->

  <!-- Modern Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Fira+Code&display=swap" rel="stylesheet">
  
  <!-- Custom Tech CSS (Overrides Theme) -->
  <link rel="stylesheet" href="{{ "css/tech-theme.css" | relURL }}">
</head>
