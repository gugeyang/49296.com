baseURL = "https://49296.com/"
languageCode = "en-us"
title = "49296.com | AI Productivity & Automation Hub"
enableRobotsTXT = true

[sitemap]
  changefreq = "weekly"
  priority = 0.5
  filename = "sitemap.xml"

#################### default parameters ################################
[params]
logo = "images/logo.png"
# Meta data
description = "49296.com is your premier AI Productivity & Automation Hub. We provide deep visual guides, download-ready blueprints, and real-world workflows for Make.com, Zapier, Notion, and ChatGPT to save you hundreds of hours."
author = "49296.com Team"
# contact info
address = "AI Automation Hub"
mobile = ""
email = "admin@49296.com"
# contact form action
contact_form_action = "#" # contact form works with https://formspree.io
# Google Analytics
  google_analytics_id = "G-47G984HYTJ" # GA4 Measurement ID
# top header
top_header = true

############################# Build ##############################
[build]
noJSConfigInAssets = false
useResourceCacheWhen = 'fallback'
[build.buildStats]
enable = true
[[build.cachebusters]]
source = 'assets/.*\.(js|ts|jsx|tsx)'
target = '(js|scripts|javascript)'
[[build.cachebusters]]
source = 'assets/.*\.(css|sass|scss)$'
target = '(css|styles|scss|sass)'
[[build.cachebusters]]
source = 'assets/.*\.(.*)$'
target = '$1'


############################# Outputs ##############################
[outputs]
home = ["HTML", "RSS"]

############################# Imaging ##############################
[imaging]
# See https://github.com/disintegration/imaging
# Default JPEG or WebP quality setting. Default is 75.
quality = 90
resampleFilter = "lanczos"

############################# Caches ###############################
[caches]
[caches.images]
dir = ":resourceDir/_gen"
maxAge = "720h"

[caches.assets]
dir = ":resourceDir/_gen"
maxAge = "720h"

############################# Markup ###############################
[markup]
[markup.goldmark.renderer]
unsafe = true

############################# Plugins ##############################

# CSS Plugins
[[params.plugins.css]]
link = "plugins/bootstrap/bootstrap.min.css"
[[params.plugins.css]]
link = "plugins/slick/slick.css"
[[params.plugins.css]]
link = "plugins/animate/animate.css"
[[params.plugins.css]]
link = "plugins/venobox/venobox.css"
[[params.plugins.css]]
link = "plugins/themify-icons/themify-icons.css"

# JS Plugins
[[params.plugins.js]]
link = "plugins/jQuery/jquery.min.js"
[[params.plugins.js]]
link = "plugins/bootstrap/bootstrap.min.js"
[[params.plugins.js]]
link = "plugins/slick/slick.min.js"
[[params.plugins.js]]
link = "plugins/venobox/venobox.min.js"
[[params.plugins.js]]
link = "plugins/filterizr/jquery.filterizr.min.js"
[[params.plugins.js]]
link = "plugins/google-map/gmap.js"


# Preloader
[params.preloader]
enable = true
preloader = "images/preloader.gif" # use jpg, png, svg or gif format.

# Subscription - disabled until a real Mailchimp account is configured
[params.subscription]
enable = false
# mailchimp subscription
mailchimp_form_action = "" # replace with your real Mailchimp form action URL
mailchimp_form_name = "" # replace with your real Mailchimp form name

# google map - disabled: removed hardcoded API key and London coordinates
[params.map]
enable = false
gmap_api = "" # insert your own Google Maps API key here when needed
map_latitude = ""
map_longitude = ""
map_marker = "images/marker.png" # marker size 37*55 px

# cookies
[params.cookies]
enable = true
expire_days = 2
  
